<!-- _includes/carousel.html -->
<style>
  .carousel-layout {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    align-items: flex-start;
    margin: 0rem 0 0rem 0;
  }

  .carousel-text {
    flex: 1 1 300px;
    min-width: 250px;
    font-size: 1rem;
    line-height: 1.6;
  }

  .carousel-wrapper {
    flex: 1 1 400px;
    max-width: {{ include.max_width | default: '600px' }};
  }

  .reverse-layout {
    flex-direction: row-reverse;
  }

  .carousel-box {
    position: relative;
    width: 100%;
  }

  .carousel-box .swiper {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    padding-bottom: 2.2rem; /* reserve room for dots */
  }

  .swiper-slide figure {
    margin: 0;
    text-align: center;
  }

.swiper-slide img {
  display: block;
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: contain;
  border-radius: 10px;
}

  .swiper-slide figcaption {
    font-size: 0.9rem;
    text-align: center;
    margin-top: 0.5rem;
    color: #666;
  }

  .swiper-button-next,
.swiper-button-prev {
  color: #1a73e8;          /* your blue */
  background: transparent; /* remove white circle */
  width: 40px;
  height: 40px;
}

.swiper-button-next::after,
.swiper-button-prev::after {
  font-size: 22px;
  font-weight: 700;
}

.swiper-button-next:hover,
.swiper-button-prev:hover {
  color: #1558b0;          /* darker blue on hover */
}

  .swiper-pagination {
    bottom: 0 !important;
    text-align: center;
  }

  .swiper-pagination-bullet {
    background: #555;
    opacity: 0.4;
  }

  .swiper-pagination-bullet-active {
    opacity: 1;
  }

  @media (max-width: 768px) {
    .carousel-layout {
      gap: 0rem;
    }

    .carousel-wrapper,
    .carousel-text {
      flex: 1 1 100%;
      max-width: 100%;
    }
  }
</style>

<div class="carousel-layout {% if include.text_position == 'right' %}reverse-layout{% endif %}">
  {% if include.text %}
  <div class="carousel-text">
    {{ include.text | markdownify }}
  </div>
  {% endif %}

  <div class="carousel-wrapper">
    <div class="carousel-box">
      <div class="swiper" id="{{ include.id | default: 'swiper-carousel' }}">
        <div class="swiper-wrapper">
          {% assign sorted_images = include.images | sort: "filename" %}
          {% for image in sorted_images %}
          <div class="swiper-slide">
            <figure>
              <img src="/assets/img/{{ include.folder }}/{{ image.filename }}" alt="{{ image.caption }}">
              {% if image.caption %}
              <figcaption>{{ image.caption }}</figcaption>
              {% endif %}
            </figure>
          </div>
          {% endfor %}
        </div>

        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const id = "#{{ include.id | default: 'swiper-carousel' }}";
    const swiperEl = document.querySelector(id);

    if (swiperEl && !swiperEl.classList.contains("swiper-initialized")) {
      new Swiper(id, {
        loop: true,
        slidesPerView: 1,
        spaceBetween: 10,
        autoHeight: true,
        pagination: {
          el: id + " .swiper-pagination",
          clickable: true
        },
        navigation: {
          nextEl: id + " .swiper-button-next",
          prevEl: id + " .swiper-button-prev"
        }
      });
    }
  });
</script>
